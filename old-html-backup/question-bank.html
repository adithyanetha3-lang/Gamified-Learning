<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Park | Question Bank</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="question-bank">
  <div class="app-layout">
    <aside class="sidebar">
      <div>
        <div class="brand-block">
          <p class="brand-title">Skill Park</p>
          <p class="brand-subtitle">Approved and published questions by subject.</p>
        </div>
        <nav class="sidebar-nav">
          <a class="nav-link" href="teacher.html">Dashboard</a>
          <a class="nav-link" href="generator.html">Question Generator</a>
          <a class="nav-link active" href="question-bank.html">Question Bank</a>
          <a class="nav-link" href="analytics.html">Analytics</a>
        </nav>
      </div>
      <button class="secondary-button wide-button" data-logout type="button">Logout</button>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>Skill Park Question Bank</h1>
          <p class="muted-text">Only teacher-approved questions are visible here.</p>
        </div>
      </header>

      <section class="panel-card">
        <div class="filter-row">
          <div>
            <label class="field-label" for="questionBankSubjectFilter">Filter by Subject</label>
            <select id="questionBankSubjectFilter" class="text-input"></select>
          </div>
        </div>
        <div id="questionBankList" class="stack-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="assets/js/pages/questionBankPage.js"></script>
</body>
</html>
